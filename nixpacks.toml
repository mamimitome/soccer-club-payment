# =============================================
# Railway (Nixpacks) デプロイ設定
# =============================================
#
# Nixpacks とは？
# Railway が使う自動ビルドシステムです。
# この設定ファイルで「何を・どの順序で・どうビルドして起動するか」を指定します。
#
# このファイルが必要な理由：
# Nixpacks のデフォルト設定では以下が行われません。
#   - npm run build （Vite アセットのビルド）
#   - php artisan migrate （DBテーブルの作成・更新）
# これらが実行されないと、本番環境で 500 エラーが発生します。

# =============================================
# インストールフェーズ
# =============================================
# アプリの起動に必要な依存関係をインストールする
[phases.install]
cmds = [
    # Composer : PHP の依存パッケージをインストール
    # --no-dev : 開発専用パッケージを除外（本番環境では不要）
    # --optimize-autoloader : クラスのオートロードを最適化（起動速度向上）
    "composer install --no-dev --optimize-autoloader",

    # npm : JavaScript の依存パッケージをインストール
    # ci（clean install）: package-lock.json を厳密に使用（バージョンの一貫性を保つ）
    "npm ci",
]

# =============================================
# ビルドフェーズ
# =============================================
# アプリの起動準備を行う（アセットのビルド・キャッシュ生成）
[phases.build]
cmds = [
    # Vite でフロントエンドアセット（CSS・JS）をビルドする
    # この処理により public/build/manifest.json が生成される
    # これがないと @vite() が例外を投げて 500 エラーになる
    "npm run build",

    # Laravel の設定ファイルをキャッシュする（起動速度向上）
    # 注意: 環境変数は起動時に確定するため、APP_URL などは Railway の環境変数で設定すること
    "php artisan config:clear",

    # ルート定義をキャッシュする（リクエスト処理の高速化）
    "php artisan route:cache",

    # Blade テンプレートをコンパイルしてキャッシュする（レスポンス速度向上）
    "php artisan view:cache",
]

# =============================================
# 起動コマンド
# =============================================
# コンテナ起動時に実行されるコマンド
# マイグレーションを実行してからサーバーを起動する
[start]
# --force : 本番環境でも確認なしでマイグレーションを実行する
# ${PORT:-8080} : Railway が提供するポート番号を使用（なければ 8080）
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
